<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareXpress - Instant File Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fbbf24, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .sub {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #fbbf24;
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.3);
        }

        .upload-area:hover {
            border-color: #ec4899;
            background: rgba(0,0,0,0.5);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .upload-area h3 {
            color: white;
            margin-bottom: 8px;
        }

        .upload-area p {
            color: #94a3b8;
        }

        input[type="file"] {
            display: none;
        }

        .file-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .file-card.show {
            display: block;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .file-icon {
            font-size: 48px;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            color: white;
            font-weight: bold;
            word-break: break-all;
        }

        .file-size {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .link-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .link-input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px;
            color: #a5f3fc;
            font-family: monospace;
            font-size: 0.85rem;
        }

        button {
            background: linear-gradient(135deg, #fbbf24, #ec4899);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .download-btn {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            color: white;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        footer {
            text-align: center;
            color: #475569;
            margin-top: 30px;
            font-size: 0.8rem;
        }

        .history-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-name {
            color: white;
            font-size: 0.85rem;
            flex: 1;
        }

        .small-btn {
            background: #06b6d4;
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        .clear-btn {
            background: #ef4444;
            margin-top: 10px;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📤 ShareXpress</h1>
        <div class="sub">Upload → Share Link → Anyone Downloads</div>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁 ➡️ 🌐</div>
            <h3>Click or Drag & Drop</h3>
            <p>Any file up to 50MB</p>
            <input type="file" id="fileInput">
        </div>

        <!-- File Info Card -->
        <div class="file-card" id="fileCard">
            <div class="file-info">
                <div class="file-icon" id="fileIcon">📄</div>
                <div class="file-details">
                    <div class="file-name" id="fileName">-</div>
                    <div class="file-size" id="fileSize">-</div>
                </div>
            </div>
            <div class="link-box">
                <input type="text" class="link-input" id="shareLink" readonly placeholder="Shareable link will appear here">
                <button id="copyBtn">📋 Copy</button>
            </div>
            <button class="download-btn" id="downloadBtn">⬇️ Download This File ⬇️</button>
        </div>

        <!-- History -->
        <div id="historyContainer"></div>
    </div>
    <footer>⚡ 1 file = 1 link | Anyone can download | No server needed</footer>
</div>

<script>
    // ============== SIMPLE WORKING VERSION ==============
    let currentFileData = null;
    let currentFileName = null;

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileCard = document.getElementById('fileCard');
    const fileNameSpan = document.getElementById('fileName');
    const fileSizeSpan = document.getElementById('fileSize');
    const fileIconSpan = document.getElementById('fileIcon');
    const shareLinkInput = document.getElementById('shareLink');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const historyContainer = document.getElementById('historyContainer');

    // Load history from localStorage
    let fileHistory = [];

    function loadHistory() {
        const saved = localStorage.getItem('sharexpress_data');
        if (saved) {
            try {
                fileHistory = JSON.parse(saved);
                renderHistory();
            } catch(e) {}
        }
    }

    function saveHistory() {
        // keep only last 8
        const toSave = fileHistory.slice(0, 8);
        localStorage.setItem('sharexpress_data', JSON.stringify(toSave));
    }

    function renderHistory() {
        if (fileHistory.length === 0) {
            historyContainer.innerHTML = '';
            return;
        }
        let html = `<div style="margin-top:20px;"><h3 style="color:#cbd5e1; margin-bottom:10px;">📜 Previously Shared</h3>`;
        fileHistory.forEach((item, idx) => {
            html += `
                <div class="history-item">
                    <span class="history-name">📄 ${item.name.substring(0, 40)} (${item.size})</span>
                    <button class="small-btn" onclick="downloadHistoryItem(${idx})">⬇️ Download</button>
                </div>
            `;
        });
        html += `<button class="clear-btn" onclick="clearHistory()">🗑️ Clear History</button></div>`;
        historyContainer.innerHTML = html;
    }

    window.downloadHistoryItem = function(idx) {
        const item = fileHistory[idx];
        if (item && item.dataUrl) {
            const link = document.createElement('a');
            link.href = item.dataUrl;
            link.download = item.originalName;
            link.click();
            showToast(`Downloading: ${item.name}`);
        } else {
            showToast('File data expired!', 'error');
        }
    };

    window.clearHistory = function() {
        fileHistory = [];
        saveHistory();
        renderHistory();
        showToast('History cleared');
    };

    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function getFileIcon(fileName, fileType) {
        if (fileType.startsWith('image/')) return '🖼️';
        if (fileType.startsWith('video/')) return '🎥';
        if (fileType.startsWith('audio/')) return '🎵';
        if (fileName.endsWith('.pdf')) return '📕';
        if (fileName.endsWith('.zip') || fileName.endsWith('.rar')) return '🗜️';
        return '📄';
    }

    function processFile(file) {
        if (!file) return;
        if (file.size > 50 * 1024 * 1024) {
            showToast('File too large! Max 50MB', 'error');
            return;
        }

        currentFileName = file.name;
        fileNameSpan.textContent = file.name;
        fileSizeSpan.textContent = formatBytes(file.size);
        fileIconSpan.textContent = getFileIcon(file.name, file.type);

        const reader = new FileReader();
        reader.onload = function(e) {
            currentFileData = e.target.result;
            
            // Generate unique ID
            const fileId = Date.now() + '-' + Math.random().toString(36).substr(2, 8);
            const shareUrl = window.location.href.split('#')[0] + '?file=' + fileId;
            shareLinkInput.value = shareUrl;

            // Store in localStorage for sharing
            const fileStore = JSON.parse(localStorage.getItem('sharexpress_files') || '{}');
            fileStore[fileId] = {
                name: file.name,
                size: formatBytes(file.size),
                originalSize: file.size,
                type: file.type,
                dataUrl: currentFileData,
                timestamp: Date.now()
            };
            localStorage.setItem('sharexpress_files', JSON.stringify(fileStore));

            // Add to history
            fileHistory.unshift({
                id: fileId,
                name: file.name,
                size: formatBytes(file.size),
                originalName: file.name,
                dataUrl: currentFileData,
                timestamp: Date.now()
            });
            saveHistory();
            renderHistory();

            fileCard.classList.add('show');
            showToast(`✅ "${file.name}" ready to share!`);
        };
        reader.onerror = () => showToast('Error reading file', 'error');
        reader.readAsDataURL(file);
    }

    // Check URL for shared file
    function checkForSharedFile() {
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('file');
        if (fileId) {
            const fileStore = JSON.parse(localStorage.getItem('sharexpress_files') || '{}');
            const fileData = fileStore[fileId];
            if (fileData && fileData.dataUrl) {
                if (confirm(`📥 Download "${fileData.name}" (${fileData.size}) ?`)) {
                    const link = document.createElement('a');
                    link.href = fileData.dataUrl;
                    link.download = fileData.name;
                    link.click();
                    showToast(`Download started: ${fileData.name}`);
                }
                // Remove param from URL without reload
                const newUrl = window.location.href.split('?')[0];
                window.history.replaceState({}, document.title, newUrl);
            } else {
                showToast('File expired or not found!', 'error');
                window.history.replaceState({}, document.title, window.location.href.split('?')[0]);
            }
        }
    }

    // Events
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#ec4899';
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = '#fbbf24';
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#fbbf24';
        const files = e.dataTransfer.files;
        if (files.length > 0) processFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) processFile(e.target.files[0]);
    });

    copyBtn.addEventListener('click', () => {
        shareLinkInput.select();
        document.execCommand('copy');
        showToast('Link copied to clipboard!');
    });

    downloadBtn.addEventListener('click', () => {
        if (currentFileData && currentFileName) {
            const link = document.createElement('a');
            link.href = currentFileData;
            link.download = currentFileName;
            link.click();
            showToast(`Downloading: ${currentFileName}`);
        } else {
            showToast('No file selected', 'error');
        }
    });

    // Clean old files (older than 1 hour)
    function cleanOldFiles() {
        const fileStore = JSON.parse(localStorage.getItem('sharexpress_files') || '{}');
        const now = Date.now();
        let changed = false;
        Object.keys(fileStore).forEach(key => {
            if (now - fileStore[key].timestamp > 3600000) {
                delete fileStore[key];
                changed = true;
            }
        });
        if (changed) localStorage.setItem('sharexpress_files', JSON.stringify(fileStore));
    }

    // Initialize
    loadHistory();
    cleanOldFiles();
    checkForSharedFile();
</script>
</body>
</html>
